name: Notion Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted, edited]

jobs:
  append-todo-to-notion:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/notion')
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '/notion')
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '/notion')
      )
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      pull-requests: read
      models: read

    steps:
      - name: Check allowed users
        id: auth
        uses: actions/github-script@v8
        with:
          script: |
            const allowed = ["nicanovotny", "agkorman", "roccoppp", "nolascoj"];

            let login = "";
            if (context.eventName === "pull_request_review") {
              login = (context.payload.review.user.login || "").toLowerCase();
            } else {
              login = (context.payload.comment.user.login || "").toLowerCase();
            }

            const ok = allowed.includes(login);
            core.setOutput("ok", ok ? "true" : "false");

            if (!ok) {
              core.setFailed(`User ${login} is not allowed.`);
            }

      - name: Extract instruction
        if: steps.auth.outputs.ok == 'true'
        id: extract
        uses: actions/github-script@v8
        with:
          script: |
            let body = "";

            if (context.eventName === "pull_request_review") {
              body = context.payload.review.body || "";
            } else {
              body = context.payload.comment.body || "";
            }

            const trigger = "/notion";
            const idx = body.indexOf(trigger);

            if (idx === -1) {
              core.setFailed("Trigger not found.");
              return;
            }

            const instruction = body.slice(idx + trigger.length).trim();
            core.setOutput("instruction", instruction || "");
            core.setOutput("body", body);

      - name: Gather source context
        if: steps.auth.outputs.ok == 'true'
        id: ctx
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let sourceText = "";
            let debug = "";

            if (context.eventName === "pull_request_review_comment") {
              const comment = context.payload.comment;
              debug = "event=pull_request_review_comment";

              if (comment.in_reply_to_id) {
                const parent = await github.rest.pulls.getReviewComment({
                  owner,
                  repo,
                  comment_id: comment.in_reply_to_id,
                });
                sourceText = parent.data.body || "";
                debug += " reply_to_parent=yes";
              } else {
                sourceText = comment.body || "";
                debug += " reply_to_parent=no";
              }
            } else if (context.eventName === "pull_request_review") {
              sourceText = context.payload.review.body || "";
              debug = "event=pull_request_review";
            } else {
              sourceText = context.payload.comment.body || "";
              debug = "event=issue_comment";
            }

            core.info(debug);
            core.setOutput("source_text", sourceText);

      - name: Generate TODO with AI
        if: steps.auth.outputs.ok == 'true'
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1-mini
          prompt: |
            Convertí el comentario técnico a un único TODO accionable en español.

            Reglas:
            - Devolvé exactamente una sola línea.
            - Debe empezar con: TODO:
            - Máximo 180 caracteres.
            - No incluyas repo, PR, autor, links ni contexto general.
            - No inventes nada.
            - Si hay varias ideas, elegí la acción principal más concreta.
            - Si la instrucción del usuario agrega una preferencia, usala.

            Comentario técnico base:
            ${{ steps.ctx.outputs.source_text }}

            Instrucción adicional:
            ${{ steps.extract.outputs.instruction }}

      - name: Append TODO to Notion
        if: steps.auth.outputs.ok == 'true'
        uses: actions/github-script@v8
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          TODO_TEXT: ${{ steps.ai.outputs.response }}
        with:
          script: |
            const todo = (process.env.TODO_TEXT || "").trim();

            if (!todo) {
              core.setFailed("AI returned empty TODO.");
              return;
            }

            const blocks = [
              {
                object: "block",
                type: "bulleted_list_item",
                bulleted_list_item: {
                  rich_text: [
                    {
                      type: "text",
                      text: {
                        content: todo.slice(0, 2000)
                      }
                    }
                  ]
                }
              }
            ];

            const res = await fetch(`https://api.notion.com/v1/blocks/${process.env.NOTION_PAGE_ID}/children`, {
              method: "PATCH",
              headers: {
                "Authorization": `Bearer ${process.env.NOTION_TOKEN}`,
                "Content-Type": "application/json",
                "Notion-Version": "2022-06-28"
              },
              body: JSON.stringify({ children: blocks })
            });

            const text = await res.text();

            if (!res.ok) {
              core.setFailed(`Notion API error ${res.status}: ${text}`);
              return;
            }

            core.info(`Added to Notion: ${todo}`);
