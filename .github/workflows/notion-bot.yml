name: Notion Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  append-to-notion:
    if: |
      contains(github.event.comment.body, '/notion') &&
      github.event.comment.user.type != 'Bot' &&
      (
        github.event.comment.user.login == 'nicanovotny' ||
        github.event.comment.user.login == 'agkorman' ||
        github.event.comment.user.login == 'roccoppp' ||
        github.event.comment.user.login == 'NolascoJ'
      )
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      pull-requests: read
      models: read

    steps:
      - name: Extract command text
        id: extract
        shell: bash
        run: |
          BODY='${{ github.event.comment.body }}'
          CONTENT="${BODY#*/notion}"
          {
            echo 'content<<EOF'
            echo "$CONTENT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Rewrite for docs with AI
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4.1-mini
          prompt: |
            Reescribí este pedido para documentación interna en español.

            Reglas:
            - No inventes nada.
            - Sé concreto y prolijo.
            - Máximo 140 palabras.
            - Devolvé markdown simple.
            - Estructura:
              ## Resumen
              ## Contexto
              ## Cambio solicitado
              ## Próximo paso

            Datos del contexto:
            - Repo: ${{ github.repository }}
            - PR/Issue: #${{ github.event.issue.number }}
            - Título: ${{ github.event.issue.title }}
            - Autor del comentario: ${{ github.event.comment.user.login }}
            - URL: ${{ github.event.comment.html_url }}

            Instrucción del usuario:
            ${{ steps.extract.outputs.content }}

      - name: Append to Notion
        uses: actions/github-script@v8
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO_NAME: ${{ github.repository }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          AI_TEXT: ${{ steps.ai.outputs.response }}
        with:
          script: |
            const aiText = process.env.AI_TEXT || "";

            function splitForNotion(text, max = 1800) {
              const parts = [];
              let remaining = text.trim();

              while (remaining.length > max) {
                let cut = remaining.lastIndexOf('\n', max);
                if (cut < 400) cut = remaining.lastIndexOf(' ', max);
                if (cut < 200) cut = max;
                parts.push(remaining.slice(0, cut).trim());
                remaining = remaining.slice(cut).trim();
              }

              if (remaining) parts.push(remaining);
              return parts;
            }

            const textParts = splitForNotion(aiText);

            const blocks = [
              {
                object: "block",
                type: "heading_2",
                heading_2: {
                  rich_text: [
                    {
                      type: "text",
                      text: {
                        content: `PR #${process.env.ISSUE_NUMBER} · ${process.env.ISSUE_TITLE}`.slice(0, 2000)
                      }
                    }
                  ]
                }
              },
              {
                object: "block",
                type: "paragraph",
                paragraph: {
                  rich_text: [
                    {
                      type: "text",
                      text: {
                        content: `Repo: ${process.env.REPO_NAME}\nAutor: ${process.env.COMMENT_AUTHOR}\nURL: ${process.env.COMMENT_URL}`.slice(0, 2000)
                      }
                    }
                  ]
                }
              }
            ];

            for (const part of textParts) {
              blocks.push({
                object: "block",
                type: "paragraph",
                paragraph: {
                  rich_text: [
                    {
                      type: "text",
                      text: {
                        content: part
                      }
                    }
                  ]
                }
              });
            }

            blocks.push({
              object: "block",
              type: "divider",
              divider: {}
            });

            const res = await fetch(`https://api.notion.com/v1/blocks/${process.env.NOTION_PAGE_ID}/children`, {
              method: "PATCH",
              headers: {
                "Authorization": `Bearer ${process.env.NOTION_TOKEN}`,
                "Content-Type": "application/json",
                "Notion-Version": "2022-06-28"
              },
              body: JSON.stringify({ children: blocks })
            });

            const text = await res.text();

            if (!res.ok) {
              core.setFailed(`Notion API error ${res.status}: ${text}`);
              return;
            }

            core.info("Content appended to Notion successfully.");
