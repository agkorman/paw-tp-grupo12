name: Notion Bot

on:
  issue_comment:
    types: [created]

jobs:
  append-to-notion:
    if: |
      contains(github.event.comment.body, '/notion') &&
      github.event.comment.user.type != 'Bot' &&
      (
        github.event.comment.user.login == 'nicanovotny' ||
        github.event.comment.user.login == 'agkorman' ||
        github.event.comment.user.login == 'roccoppp' ||
        github.event.comment.user.login == 'NolascoJ'
      )
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: read
      pull-requests: read

    steps:
      - name: Append comment content to Notion
        uses: actions/github-script@v7
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO_NAME: ${{ github.repository }}
        with:
          script: |
            const body = process.env.COMMENT_BODY || "";
            const trigger = "/notion";
            const idx = body.indexOf(trigger);

            if (idx === -1) {
              core.info("No trigger found.");
              return;
            }

            const content = body.slice(idx + trigger.length).trim();

            if (!content) {
              core.setFailed("Found /notion but no content after it.");
              return;
            }

            const isPR = !!context.payload.issue.pull_request;
            const sourceType = isPR ? "PR" : "Issue";

            const blocks = [
              {
                object: "block",
                type: "heading_3",
                heading_3: {
                  rich_text: [
                    {
                      type: "text",
                      text: {
                        content: `${sourceType} #${process.env.ISSUE_NUMBER} · ${process.env.ISSUE_TITLE}`.slice(0, 2000)
                      }
                    }
                  ]
                }
              },
              {
                object: "block",
                type: "paragraph",
                paragraph: {
                  rich_text: [
                    {
                      type: "text",
                      text: {
                        content: `Repo: ${process.env.REPO_NAME}\nAuthor: ${process.env.COMMENT_AUTHOR}\nURL: ${process.env.COMMENT_URL}\n\n${content}`.slice(0, 2000)
                      }
                    }
                  ]
                }
              }
            ];

            const res = await fetch(`https://api.notion.com/v1/blocks/${process.env.NOTION_PAGE_ID}/children`, {
              method: "PATCH",
              headers: {
                "Authorization": `Bearer ${process.env.NOTION_TOKEN}`,
                "Content-Type": "application/json",
                "Notion-Version": "2022-06-28"
              },
              body: JSON.stringify({ children: blocks })
            });

            const text = await res.text();

            if (!res.ok) {
              core.setFailed(`Notion API error ${res.status}: ${text}`);
              return;
            }

            core.info("Content appended to Notion successfully.");
